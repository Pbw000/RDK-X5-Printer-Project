#AMCL（自适应蒙特卡洛定位）通过粒子滤波估计机器人在已知地图中的位姿
amcl:
  ros__parameters:
    #初始化与恢复参数
    set_initial_pose: true
    initial_pose:
      x: 3.4
      y: 0.74
      z: 0.0
      yaw: -0.5
    #基础参数配置
    use_sim_time: false
    global_frame_id: "map"
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    scan_topic: "/scan"
    tf_broadcast: true
    transform_tolerance: 1.0
    #粒子滤波器参数
    max_particles: 2000
    min_particles: 500
    resample_interval: 1
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    update_min_a: 0.1
    update_min_d: 0.1
    #激光雷达观测模型参数
    laser_model_type: "likelihood_field"
    laser_max_range: 8.0
    laser_min_range: 0.26
    max_beams: 30
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.2
    z_hit: 0.8
    z_max: 0.05
    z_rand: 0.15
    z_short: 0.05
    lambda_short: 0.1
    #运动模型参数
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.15
    alpha2: 0.15
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.1
    save_pose_rate: 0.5
    do_beamskip: false
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    beam_skip_distance: 0.5 
#bt_navigator 负责根据预设的“剧本”（即行为树 XML）协调规划、控制和恢复等动作，完成导航任务。
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.
    # default_nav_to_pose_bt_xml: "nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml"
    # default_nav_through_poses_bt_xml: "nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
#controller_server 负责执行局部路径规划，它接收全局路径，
#并结合实时传感器信息（如激光雷达），计算出机器人的速度和
#转向指令来控制硬件平台。这些参数直接决定了机器人运动的平
#滑度、安全性和避障的智能程度。
controller_server:
  ros__parameters:
    #Controller Server 通用参数
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3
    
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    #进度检查器 (Progress Checker)
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 10.0
    #目标检查器 (Goal Checker)
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15
    # DWB 局部规划器核心参数
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.2
      lookahead_dist: 0.35          # 更短前瞻：近场更灵敏
      min_lookahead_dist: 0.15      # 最小前瞻更短
      max_lookahead_dist: 0.6       # 最大前瞻缩短
      lookahead_time: 1.5           # 更短时间窗口
      rotate_to_heading_angular_vel: 0.5
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.4   # 更早减速
      use_collision_detection: true
      max_allowed_time_to_collision: 2.0    # 更短碰撞预测时间（近场）
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.25               # 更贴近代价调节
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0
      regulated_linear_scaling_min_radius: 0.25   # 更小最小转弯半径
      regulated_linear_scaling_min_speed: 0.05
#local_costmap 负责机器人周围局部区域的障碍物感知和代价
#地图构建，用于局部规划器（如 DWB）实时避障。它通常随机器
#人移动（rolling_window: true），只关注附近几米内的环境。
local_costmap:
  local_costmap:
    ros__parameters:
      #基础配置参数
      update_frequency: 6.0     # 更快更新：近场障碍实时反映
      publish_frequency: 3.0    # 更高发布频率
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      #机器人外形参数
      # robot_radius: 0.22
      footprint: "[[0.1, 0.12], [0.1, -0.12], [-0.15, -0.12], [-0.15, 0.12]]"
      #插件（Plugins）局部代价地图使用三个插件：voxel_layer
      #（障碍物层）、inflation_layer（膨胀层）、以及注释掉的
      # static_layer（静态地图层，局部通常不需要）
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan midas_cloud
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.3
          obstacle_max_range: 2.5
          obstacle_min_range: 0.3
        midas_cloud:
          topic: /midas/obstacles_cloud
          data_type: "PointCloud2"
          marking: True
          clearing: False           # MiDaS 只标记障碍，不清除（LiDAR 负责清除）
          obstacle_max_range: 1.2   # 匹配 MiDaS max_depth，只关心近场
          obstacle_min_range: 0.3   # 检测更近的障碍（0.3m起）
          raytrace_max_range: 1.5   # 略大于 obstacle_max_range
          raytrace_min_range: 0.3
          min_obstacle_height: 0.30 # 更严格：忽略地面级杂波（LiDAR 覆盖 0-0.30m）
          max_obstacle_height: 1.8  # 检测桌面、人等中低障碍
          observation_persistence: 0.05  # 极短持续——瞬时障碍快速消失
      #膨胀层
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 15.0    # 快速衰减：障碍影响范围更精确
        inflation_radius: 0.35       # 紧凑膨胀：近场导航更灵活
      always_send_full_costmap: True
#global_costmap 负责全局路径规划，它通常基于静态地图（如预先构
#建的 SLAM 地图），并结合实时障碍物信息（来自激光雷达等），生成
#一张覆盖整个环境的大范围代价地图。全局规划器（如 Navfn 或 
#GridBased）使用这张地图计算从起点到终点的全局路径。
global_costmap:
  global_costmap:
    ros__parameters:
      #基础配置参数
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      # robot_radius: 0.22
      footprint: "[[0.1, 0.12], [0.1, -0.12], [-0.15, -0.12], [-0.15, 0.12]]"
      resolution: 0.1
      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.3
          obstacle_max_range: 4.0
          obstacle_min_range: 0.3
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.4
      always_send_full_costmap: True

map_server:

  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: False #使用A*算法
      allow_unknown: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-5
      max_its: 200
      do_refinement: False

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    # behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    behavior_plugins: ["spin", "backup",  "drive_on_heading","wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    # assisted_teleop:
    #   plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 2.0
    use_sim_time: False
    simulate_ahead_time: 1.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.1
    rotational_acc_lim: 2.0

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 5

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 10.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 1.0]
    min_velocity: [-0.3, 0.0, -1.0]
    max_accel: [0.5, 0.0, 1.5]
    max_decel: [-0.5, 0.0, -1.5]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
